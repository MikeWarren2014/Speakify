name: Deploy Speakify release
'on':
  workflow_dispatch: null
  push:
    branches:
      - release
jobs:
  build:
    name: Job 1 - Build Signed AAB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Create apiKeys.properties
        run: |
          echo "CLERK_PUBLISHABLE_KEY=${{ secrets.CLERK_PUBLISHABLE_KEY }}" > apiKeys.properties
      - name: Setup Gradle Cache
        uses: gradle/gradle-build-action@v2
        with:
          gradle-home-cache-cleanup: true
      - name: Extract versionCode and versionName
        id: get_versions
        run: |
          ./gradlew -q printVersionCodeAndName > version_output.txt
          cat version_output.txt
          echo "VERSION_CODE=$(grep VERSION_CODE version_output.txt | cut -d '=' -f2)" >> $GITHUB_ENV
          echo "VERSION_NAME=$(grep VERSION_NAME version_output.txt | cut -d '=' -f2)" >> $GITHUB_ENV
      # Source - https://stackoverflow.com/a/75127891
      # Posted by Pieter Svenson, modified by community. See post 'Timeline' for change history
      # Retrieved 2026-04-04, License - CC BY-SA 4.0

      - name: Create Google Services JSON File
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo $GOOGLE_SERVICES_JSON | base64 -di > ./app/google-services.json

      - name: Build prodRelease
        run: ./gradlew bundleRelease -Pandroid.injected.versionCode=${{ github.run_number }} -Pandroid.injected.versionName=${{ env.VERSION_NAME }}
      - name: Sign AAB
        id: sign
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/bundle/release
          signingKeyBase64: '${{ secrets.KEYSTORE }}'
          alias: '${{ secrets.SIGNING_KEY_ALIAS }}'
          keyStorePassword: '${{ secrets.SIGNING_STORE_PASSWORD }}'
          keyPassword: '${{ secrets.SIGNING_KEY_PASSWORD }}'
      - name: Upload app bundle as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle
          path: app/build/outputs/bundle/release/app-release.aab
      - run: 'echo Build status report=${{ job.status }}'
  deploy:
    name: Job_2 - Deploy aab to playstore
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Download app bundle from artifact
        uses: actions/download-artifact@v4
        with:
          path: app/build/outputs/bundle/release/
          name: app-bundle
      - name: Publish to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: '${{ secrets.SERVICE_ACCOUNT_JSON }}'
          packageName: com.mikewarren.speakify
          releaseFiles: app/build/outputs/bundle/release/*.aab
          track: production
          whatsNewDirectory: app/whatsnew
          mappingFile: app/build/outputs/mapping/release/mapping.txt
